name: Feldera

on:
  push:
    branches:
      - main
      - "*.x.x"
  pull_request:
    branches:
      - main
      - "*.x.x"
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  HYPOTHESIS_PROFILE: "ci"

jobs:
  test_feldera:
    name: Feldera ubuntu-latest python-${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.14"
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - uses: extractions/setup-just@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: download backend data
        run: just download-data

      - name: start feldera
        run: just up feldera

      - name: install python
        uses: actions/setup-python@v6
        id: install_python
        with:
          python-version: ${{ matrix.python-version }}

      - name: install uv
        uses: astral-sh/setup-uv@v7.3.0

      - name: run feldera tests
        timeout-minutes: 30
        run: >
          just ci-check "--extra feldera --extra examples"
          ibis/backends/feldera/tests
          ibis/backends/tests/test_client.py
          ibis/backends/tests/test_expr_caching.py
          ibis/backends/tests/test_generic.py
          ibis/backends/tests/test_numeric.py
          ibis/backends/tests/test_string.py
          ibis/backends/tests/test_udf.py
          -m feldera
        env:
          IBIS_EXAMPLES_DATA: ${{ runner.temp }}/examples-feldera-${{ matrix.os }}-${{ steps.install_python.outputs.python-version }}

      - name: checkout uv.lock and pyproject.toml
        run: git checkout uv.lock pyproject.toml

      - name: check that no untracked files were produced
        shell: bash
        run: |
          ! git status --porcelain | grep -F .

      - name: upload code coverage
        if: success()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          flags: backend,feldera,${{ runner.os }},python-${{ steps.install_python.outputs.python-version }}
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show docker compose logs on fail
        if: failure()
        run: docker compose logs feldera
